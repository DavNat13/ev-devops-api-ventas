version: "3.8"

services:
  # 1. Capa de Datos (MySQL 8.0)
  mysql-db:
    image: mysql:8.0
    container_name: db-innovatech
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: innovatech_db
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - back-tier

  # 2. API de Despachos
  api-despacho:
    image: ${ECR_REPO_URL_DESPACHO}:latest
    container_name: api-despacho
    restart: always
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/innovatech_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - mysql-db
    networks:
      - back-tier

  # 3. API de Ventas
  api-ventas:
    image: ${ECR_REPO_URL_VENTAS}:latest
    container_name: api-ventas
    restart: always
    ports:
      - "8082:8080"
    environment:
      # URL corregida con allowPublicKeyRetrieval para MySQL 8.0
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/innovatech_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - mysql-db
    networks:
      - back-tier

volumes:
  # Definición del volumen nombrado para persistencia de datos
  db-data:

networks:
  # Red bridge personalizada para aislamiento de microservicios
  back-tier:
    driver: bridge
